<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Pensão Alimentícia - Belizza Araújo</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Satisfy&display=swap');
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #fdf7fa; padding: 20px; text-align: center; color: #444; }
    .container { background: white; max-width: 600px; margin: auto; padding: 30px; border-radius: 18px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-top: 6px solid #b76e79; }
    h1 { color: #b76e79; margin-bottom: 5px; font-size: 1.8em; }
    .subtitulo { font-size: 0.9em; color: #888; margin-bottom: 20px; }
    .satisfy { font-family: 'Satisfy', cursive; font-size: 1.1em; color: #b76e79; }
    label { display: block; margin-top: 15px; text-align: left; font-weight: bold; color: #7a4a52; }
    select, input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
    .status-sm { font-size: 0.8em; color: #999; text-align: left; margin-top: 5px; }
    
    .checkbox-container { display: flex; align-items: center; margin-top: 15px; background: #fff5f7; padding: 12px; border-radius: 8px; border: 1px dashed #d88fa0; }
    .checkbox-container input { width: auto; margin-right: 10px; cursor: pointer; height: 20px; width: 20px; }
    .checkbox-container label { margin-top: 0; font-size: 0.85em; cursor: pointer; color: #7a4a52; }

    button { width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 10px; background: #d88fa0; color: white; font-weight: bold; font-size: 1.1em; cursor: pointer; transition: 0.3s; }
    button:hover { background: #c5768b; }
    .resultado { margin-top: 25px; background: #fff0f4; padding: 20px; border-radius: 10px; text-align: left; border-left: 5px solid #d88fa0; display: none; }
    #btnWhats { background-color: #25d366; display: none; margin-top: 10px; }
    .aviso { margin-top: 30px; font-size: 0.85em; color: #999; line-height: 1.5; }
</style>
</head>
<body>

<div class="container">
    <h1>🌸 Calculadora de Pensão Alimentícia</h1>
    <div class="subtitulo">Calcule o valor estimado da pensão - por Belizza Araújo</div>

    <label>Base do cálculo:</label>
    <select id="base" onchange="toggleCampos()">
        <option value="minimo">Salário Mínimo Vigente</option>
        <option value="rendimentos">Rendimentos do Pagador</option>
    </select>
    <div id="sm-status" class="status-sm">Carregando salário...</div>

    <div id="campo-salario" style="display:none;">
        <label>Rendimento Bruto (R$):</label>
        <input type="number" id="valor_base" placeholder="0.00" step="0.01">
        
        <div class="checkbox-container">
            <input type="checkbox" id="descontosLegais">
            <label for="descontosLegais">Abater descontos obrigatórios (INSS/IRRF) para obter o valor líquido.</label>
        </div>
    </div>

    <label>Porcentagem da Pensão (%):</label>
    <input type="number" id="porcentagem" placeholder="Ex: 30" step="0.1">

    <button onclick="calcular()">Calcular Agora</button>

    <div id="resultado" class="resultado"></div>
    <button id="btnWhats" onclick="enviarWhatsApp()">Enviar para WhatsApp</button>

    <div class="aviso">
        Esta é apenas uma valor estimado. O valor real depende do salário mínimo ou do salário do pagador. <br>
        🌸 <span class="satisfy">Desenvolvido por Belizza Araújo – Oficiala de Justiça do TJPE</span><br>
    </div>
</div>

<script>
    // Valor 2026 - Instantâneo
    let smOficial = 1621.00; 

    function atualizarDisplaySM() {
        document.getElementById('sm-status').innerText = `Valor Base (Vigente 2026): R$ ${smOficial.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
    }

    async function buscarSM() {
        atualizarDisplaySM();
        try {
            const controller = new AbortController();
            setTimeout(() => controller.abort(), 1500);
            const res = await fetch('https://api.bcb.gov.br/dados/serie/bcdata.sgs.1619/dados/ultimos/1?formato=json', { signal: controller.signal });
            const d = await res.json();
            if(d && d[0]) {
                smOficial = parseFloat(d[0].valor);
                atualizarDisplaySM();
            }
        } catch (e) { console.log("Offline mode."); }
    }

    function toggleCampos() {
        document.getElementById('campo-salario').style.display = (document.getElementById('base').value === 'rendimentos') ? 'block' : 'none';
        document.getElementById('resultado').style.display = 'none';
        document.getElementById('btnWhats').style.display = 'none';
    }

    function calcular() {
        const porcento = parseFloat(document.getElementById('porcentagem').value);
        const baseTipo = document.getElementById('base').value;
        let baseV = (baseTipo === 'minimo') ? smOficial : parseFloat(document.getElementById('valor_base').value);
        const aplicarDescontos = document.getElementById('descontosLegais').checked;

        if(!porcento || isNaN(baseV) || baseV <= 0) { alert("Preencha os campos!"); return; }

        let detalheOriginal = "";
        // Lógica de Descontos Legais (Estimativa Simplificada INSS/IRRF)
        if(baseTipo === 'rendimentos' && aplicarDescontos) {
            let original = baseV;
            // Desconto médio estimado (INSS + IRRF) - Aprox 15% para cálculos de pensão
            baseV = baseV * 0.85; 
            detalheOriginal = `<br><small style="color: #d9534f;">Base reduzida de ${original.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})} para líquido estimado.</small>`;
        }

        const total = (baseV * (porcento / 100));
        const res = document.getElementById('resultado');
        const vFinal = total.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});

        res.innerHTML = `
            <strong>Resultado da Simulação:</strong><br>
            <span style="font-size: 1.2em; color: #b76e79; display:block; margin: 10px 0;">Pensão Estimada: ${vFinal}</span>
            <small style="color: #888;">Base Líquida: ${baseV.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})} | ${porcento}%</small>
            ${detalheOriginal}
        `;
        
        res.style.display = 'block';
        document.getElementById('btnWhats').style.display = 'block';
        
        window.msgWhats = `*Calculadora de Pensão - Belizza Araújo*%0A` +
                          `• Base: ${vBase}%0A` +
                          `• Porcentagem: ${porcento}%25%0A` +
                          `*• Valor Estimado: ${vFinal}*` +
        `Dica da Oficiala: Caso não possa pagar o valor estimado, procure um advogado ou Defensor Público.`;
    }

    function enviarWhatsApp() { 
        if(window.msgWhats) window.open(`https://api.whatsapp.com/send?text=${window.msgWhats}`, '_blank'); 
    }

    buscarSM();
</script>
</body>
</html>
