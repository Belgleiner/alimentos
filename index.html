<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Pensão Alimentícia - Belizza Araújo</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Satisfy&display=swap');
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #fdf7fa; padding: 20px; text-align: center; color: #444; }
    .container { background: white; max-width: 600px; margin: auto; padding: 30px; border-radius: 18px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-top: 6px solid #b76e79; }
    h1 { color: #b76e79; margin-bottom: 5px; font-size: 1.8em; }
    .subtitulo { font-size: 0.9em; color: #888; margin-bottom: 20px; }
    .satisfy { font-family: 'Satisfy', cursive; font-size: 1.1em; color: #b76e79; }
    label { display: block; margin-top: 15px; text-align: left; font-weight: bold; color: #7a4a52; }
    select, input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
    .status-sm { font-size: 0.8em; color: #999; text-align: left; margin-top: 5px; }
    
    .checkbox-container { display: flex; align-items: center; margin-top: 15px; background: #fff5f7; padding: 12px; border-radius: 8px; border: 1px dashed #d88fa0; }
    .checkbox-container input { width: auto; margin-right: 10px; cursor: pointer; height: 20px; width: 20px; }
    .checkbox-container label { margin-top: 0; font-size: 0.85em; cursor: pointer; color: #7a4a52; text-align: left; }

    button { width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 10px; background: #d88fa0; color: white; font-weight: bold; font-size: 1.1em; cursor: pointer; transition: 0.3s; }
    button:hover { background: #c5768b; }
    .resultado { margin-top: 25px; background: #fff0f4; padding: 20px; border-radius: 10px; text-align: left; border-left: 5px solid #d88fa0; display: none; }
    .detalhe-impostos { background: #fff; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 0.85em; border: 1px solid #f2d7dc; }
    #btnWhats { background-color: #25d366; display: none; margin-top: 10px; }
    .aviso { margin-top: 30px; font-size: 0.85em; color: #999; line-height: 1.5; }
</style>
</head>
<body>

<div class="container">
    <h1>🌸 Calculadora de Pensão</h1>
    <div class="subtitulo">Simulador por Belizza Araújo - Oficiala de Justiça</div>

    <label>Base do cálculo:</label>
    <select id="base" onchange="toggleCampos()">
        <option value="minimo">Salário Mínimo Vigente</option>
        <option value="rendimentos">Rendimentos do Pagador</option>
    </select>
    <div id="sm-status" class="status-sm">Carregando salário...</div>

    <div id="campo-salario" style="display:none;">
        <label>Rendimento Bruto (R$):</label>
        <input type="number" id="valor_base" placeholder="Ex: 4000.00" step="0.01">
        
        <div class="checkbox-container">
            <input type="checkbox" id="descontosLegais" checked>
            <label for="descontosLegais">Abater descontos obrigatórios (INSS/IRPF)</label>
        </div>
    </div>

    <label>Porcentagem da Pensão (%):</label>
    <input type="number" id="porcentagem" placeholder="Ex: 10" step="0.1">

    <button onclick="calcular()">Calcular Agora</button>

    <div id="resultado" class="resultado"></div>
    <button id="btnWhats" onclick="enviarWhatsApp()">Enviar para WhatsApp</button>

    <div class="aviso">
        Esta ferramenta é um simulador informativo e não substitui uma decisão judicial.<br>
        🌸 <span class="satisfy">Belizza Araújo – TJPE</span>
    </div>
</div>

<script>
    let smOficial = 1518.00; 

    function atualizarDisplaySM() {
        const el = document.getElementById('sm-status');
        if(el) el.innerText = `Valor Base: R$ ${smOficial.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
    }

    function toggleCampos() {
        document.getElementById('campo-salario').style.display = (document.getElementById('base').value === 'rendimentos') ? 'block' : 'none';
        document.getElementById('resultado').style.display = 'none';
        document.getElementById('btnWhats').style.display = 'none';
    }

    let textoWhats = "";

    function calcular() {
        const porcento = parseFloat(document.getElementById('porcentagem').value);
        const baseTipo = document.getElementById('base').value;
        let valorBruto = (baseTipo === 'minimo') ? smOficial : parseFloat(document.getElementById('valor_base').value);
        const aplicarDescontos = document.getElementById('descontosLegais').checked;

        if(!porcento || isNaN(valorBruto) || valorBruto <= 0) { 
            alert("Por favor, preencha os valores corretamente."); 
            return; 
        }

        let inss = 0;
        let irpf = 0;
        let valorCalculo = valorBruto;
        let htmlDescontos = "";

        if(baseTipo === 'rendimentos' && aplicarDescontos) {
            // INSS 2026 (Estimado)
            if (valorBruto <= 1518) inss = valorBruto * 0.075;
            else if (valorBruto <= 2800) inss = (valorBruto * 0.09) - 22.77;
            else if (valorBruto <= 4200) inss = (valorBruto * 0.12) - 106.77;
            else inss = (valorBruto * 0.14) - 190.77;
            if (inss > 950) inss = 950; // Teto aproximado

            // IRPF (Base = Bruto - INSS)
            let baseIRPF = valorBruto - inss;
            if (baseIRPF <= 2259.20) irpf = 0;
            else if (baseIRPF <= 2826.65) irpf = (baseIRPF * 0.075) - 169.44;
            else if (baseIRPF <= 3751.05) irpf = (baseIRPF * 0.15) - 381.44;
            else if (baseIRPF <= 4664.68) irpf = (baseIRPF * 0.225) - 662.77;
            else irpf = (baseIRPF * 0.275) - 896.00;

            valorCalculo = valorBruto - inss - irpf;
            
            htmlDescontos = `
                <div class="detalhe-impostos">
                    <strong>Descontos Aplicados:</strong><br>
                    INSS: R$ ${inss.toLocaleString('pt-BR', {minimumFractionDigits:2})}<br>
                    IRPF: R$ ${irpf.toLocaleString('pt-BR', {minimumFractionDigits:2})}
                </div>
            `;
        }

        const totalPensao = (valorCalculo * (porcento / 100));
        
        // Exibição na Tela
        const resDiv = document.getElementById('resultado');
        resDiv.innerHTML = `
            <div style="line-height: 1.6;">
                <strong style="font-size: 0.9em; color: #7a4a52;">Resultado da Simulação:</strong>
                <span style="font-size: 1.4em; color: #b76e79; font-weight: bold; display:block; margin: 5px 0;">
                    Pensão: ${totalPensao.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}
                </span>
                ${htmlDescontos}
                <small style="color: #666;">
                    <b>Base Líquida:</b> ${valorCalculo.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}<br>
                    <b>Porcentagem:</b> ${porcento}%
                </small>
            </div>
        `;
        
        resDiv.style.display = 'block';
        document.getElementById('btnWhats').style.display = 'block';

        // Texto para o WhatsApp
        let txtInssIrpf = aplicarDescontos ? `%0A- INSS: R$ ${inss.toFixed(2)}%0A- IRPF: R$ ${irpf.toFixed(2)}` : "";
        
        textoWhats = `*Simulação de Pensão Alimentícia*%0A` +
                     `----------------------------%0A` +
                     `*Valor da Pensão:* ${totalPensao.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}%0A` +
                     `*Base Líquida:* ${valorCalculo.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}%0A` +
                     `*Porcentagem:* ${porcento}%25%0A` +
                     `${txtInssIrpf}%0A%0A` +
                     `_Calculado por Belizza Araújo_`;
    }

    function enviarWhatsApp() {
        if (textoWhats !== "") {
            window.open("https://api.whatsapp.com/send?text=" + textoWhats, '_blank');
        }
    }

    atualizarDisplaySM();
</script>
</body>
</html>
