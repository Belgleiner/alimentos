<script>
    // Valor oficial vigente para 2026 (Decreto 12.797/2025)
    // Definido como constante para carregamento instantâneo
    let smOficial = 1621.00; 

    async function buscarSM() {
        const statusElement = document.getElementById('sm-status');
        
        // Exibe o valor padrão imediatamente para não travar o usuário
        statusElement.innerText = `Valor Base (Vigente 2026): R$ ${smOficial.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;

        try {
            // Tentativa de busca em fonte secundária (mais rápida que o BC)
            // Usamos um controlador de tempo (timeout) de 2 segundos
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2000);

            const res = await fetch('https://opas.org.br/api/salario-minimo/', { signal: controller.signal });
            const d = await res.json();
            
            if(d && d.valor && parseFloat(d.valor) > 0) {
                smOficial = parseFloat(d.valor);
                statusElement.innerText = `Salário Mínimo Atualizado: R$ ${smOficial.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            }
            clearTimeout(timeoutId);
        } catch (e) { 
            // Se houver erro ou demora, o valor R$ 1.621,00 já está na tela e pronto para uso
            console.log("Mantendo valor base de segurança.");
        }
    }

    function toggleCampos() {
        const campoSalario = document.getElementById('campo-salario');
        const baseSel = document.getElementById('base').value;
        campoSalario.style.display = (baseSel === 'rendimentos') ? 'block' : 'none';
        
        document.getElementById('resultado').style.display = 'none';
        document.getElementById('btnWhats').style.display = 'none';
    }

    function calcular() {
        const porcentoInput = document.getElementById('porcentagem').value;
        const rendimentoInput = document.getElementById('valor_base').value;
        const baseTipo = document.getElementById('base').value;

        let porcento = parseFloat(porcentoInput);
        let baseV = (baseTipo === 'minimo') ? smOficial : parseFloat(rendimentoInput);

        if(!porcento || isNaN(baseV) || baseV <= 0) { 
            alert("Por favor, informe a porcentagem e o valor base corretamente."); 
            return; 
        }

        let total = (baseV * (porcento / 100));
        let res = document.getElementById('resultado');
        
        const valorFormatado = total.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        const baseFormatada = baseV.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});

        res.innerHTML = `
            <strong>Resultado da Simulação:</strong><br>
            <span style="font-size: 1.1em; color: #b76e79;">Pensão Estimada: ${valorFormatado}</span><br>
            <small style="color: #888;">Base: ${baseFormatada} | Porcentagem: ${porcento}%</small>
        `;
        
        res.style.display = 'block';
        document.getElementById('btnWhats').style.display = 'block';
        
        window.msgWhats = `*Calculadora de Pensão - Belizza Araújo*%0A` +
                          `• Base: ${baseFormatada}%0A` +
                          `• Porcentagem: ${porcento}%25%0A` +
                          `*• Valor Estimado: ${valorFormatado}*`;
    }

    function enviarWhatsApp() { 
        if(window.msgWhats) {
            window.open(`https://api.whatsapp.com/send?text=${window.msgWhats}`, '_blank'); 
        }
    }

    // Executa a busca ao abrir
    buscarSM();
</script>
